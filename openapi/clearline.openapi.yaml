openapi: 3.1.0
info:
  title: Clearline API
  version: 0.1.0
  description: Demo OpenAPI contract for the Clearline enterprise backend.
servers:
  - url: http://localhost:4000/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service health payload
  /auth/login:
    post:
      summary: Authenticate a user
      responses:
        '200':
          description: Session and token payload
  /users:
    get:
      summary: List users
      responses:
        '200':
          description: Collection of users
  /teams:
    get:
      summary: List teams
      responses:
        '200':
          description: Collection of teams
  /billing/plans:
    get:
      summary: List billing plans
      responses:
        '200':
          description: Collection of plans
  /invoices:
    post:
      summary: Create invoice draft
      responses:
        '201':
          description: Created invoice
  /payments/intents:
    post:
      summary: Create payment intent
      responses:
        '201':
          description: Created payment intent
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

